        /* إعدادات عامة لمنع التداخل */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column; /* ترتيب العناصر عمودياً */
            align-items: center;
            min-height: 100vh; /* ضمان تغطية طول الشاشة */
        }

        /* حاويات الإعلانات - تضمن عدم تخريب التصميم */
        .ad-slot {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
            min-height: 50px; /* مساحة محجوزة للإعلان */
            background: rgba(0,0,0,0.2); /* تظليل بسيط لمكان الإعلان */
        }

        /* المربع الرئيسي للموقع */
        .main-app-container {
            flex: 1; /* يأخذ المساحة المتبقية ويحاول التوسط */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0;
        }

        .card-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.1);
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 10px; color: #ffffff; }
        p { font-size: 14px; color: #aaaaaa; margin-bottom: 25px; }
        
        /* تصميم البطاقات */
        .team-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .card-rma { border-color: #dddddd; }
        .card-rma:hover { background: #ffffff; color: #121212; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .card-bar { border-color: #a50044; background: linear-gradient(to right, rgba(0, 77, 152, 0.1), rgba(165, 0, 68, 0.1)); }
        .card-bar:hover { background: linear-gradient(to right, #004d98, #a50044); color: white; box-shadow: 0 0 15px rgba(165,0,68,0.3); }

        /* شاشات اللعبة */
        #loading-screen, #result-screen { display: none; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .reveal-btn {
            background: linear-gradient(45deg, #00ff88, #00bd68);
            border: none;
            color: #121212;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            transition: 0.3s;
        }
        .reveal-btn:hover {
            transform: scale(1.02);
        }
        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        /* مكان إعلان داخل المربع */
        .internal-ad {
            margin: 20px 0;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
