<head>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        p {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 25px;
        }
        
        /* Team Selection Buttons */
        .team-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Real Madrid Styling */
        .card-rma {
            border-color: #dddddd;
        }
        .card-rma:hover {
            background: #ffffff;
            color: #121212;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .card-rma h2 { margin: 0; font-size: 20px; color: inherit; }

        /* Barcelona Styling */
        .card-bar {
            border-color: #a50044;
            background: linear-gradient(to right, rgba(0, 77, 152, 0.2), rgba(165, 0, 68, 0.2));
        }
        .card-bar:hover {
            background: linear-gradient(to right, #004d98, #a50044);
            color: white;
            box-shadow: 0 0 15px rgba(165, 0, 68, 0.4);
        }
        .card-bar h2 { margin: 0; font-size: 20px; color: inherit; }

        /* Loading Screen */
        #loading-screen, #result-screen {
            display: none;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Result Button */
        .reveal-btn {
            background: linear-gradient(45deg, #ff0055, #ffaa00);
            border: none;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .error-text {
            color: #ff4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

        <p>Select a team to predict their NEXT match score!</p>

            <h2>Real Madrid CF</h2>
            <span style="font-size: 12px; margin-top: 5px; opacity: 0.8;">Predict Next Match ➔</span>
        </div>

        <div class="team-card card-bar" onclick="startAI('FC Barcelona')">
            <h2>FC Barcelona</h2>
            <span style="font-size: 12px; margin-top: 5px; opacity: 0.8;">Predict Next Match ➔</span>
        </div>
    </div>

    <div class="container" id="loading-screen">
        <div class="spinner"></div>
        <h2 style="font-size: 18px; color: #00ff88;" id="loading-title">Analyzing...</h2>
        <p id="loading-text">Connecting to AI database...</p>
    </div>

    <div class="container" id="result-screen">
        <h1 style="color: #00ff88;">Prediction Ready! 🎯</h1>
        <p id="result-text">AI has calculated the exact score.</p>
        <button class="reveal-btn" id="final-btn" onclick="revealScore()">Reveal AI Score</button>
        <p class="error-text" id="server-error">⚠️ Server overloaded. Tap again to force load.</p>
    </div>

    <script>
        // روابط أدستيرا الخاصة بك
        const directLink = "https://your-adsterra-direct-link.com";
        const smartLink = "https://www.profitablecpmratenetwork.com/ey96x8ua0?key=e2e3a6c8d246fb75cfde14d235d3bb42";
        
        let clickCount = 0;
        let selectedTeam = "";

        function startAI(teamName) {
            selectedTeam = teamName;

            // إخفاء الشاشة الأولى وإظهار التحميل
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            
            // تحديث النصوص باسم الفريق المختار
            document.getElementById('loading-title').innerText = "Analyzing " + selectedTeam;

            // تسلسل ذكي يعطي إحساس بالبحث الحقيقي
            setTimeout(() => { document.getElementById('loading-text').innerText = "Locating next opponent..."; }, 800);
            setTimeout(() => { document.getElementById('loading-text').innerText = "Calculating win probability..."; }, 1800);
            setTimeout(() => { document.getElementById('loading-text').innerText = "Finalizing exact score..."; }, 2800);

            // الانتقال لشاشة النتيجة المخصصة
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                document.getElementById('result-text').innerText = "AI found a 94.2% accurate prediction for " + selectedTeam + "'s next game.";
            }, 3800);
        }

        function revealScore() {
            clickCount++;

            if (clickCount === 1) {
                // الضغطة الأولى تفتح إعلان البوب أندر
                window.open(directLink, '_blank');
                
                // تغيير شكل الزر لإظهار مشكلة السيرفر
                let btn = document.getElementById('final-btn');
                btn.style.background = "#555";
                btn.style.animation = "none";
                btn.innerText = "Force Reload Result";
                
                // إظهار رسالة السيرفر المزدحم
                document.getElementById('server-error').style.display = 'block';
            } 
            else if (clickCount === 2) {
                // الضغطة الثانية تحول المستخدم للرابط الذكي
                window.location.href = smartLink;
            }
        }
    </script>
