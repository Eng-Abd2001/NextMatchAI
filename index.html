<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Match Predictor 🔥</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            z-index: 2;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .ad-placeholder {
            width: 100%;
            margin: 15px 0;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="ad-placeholder">
        </div>

    <div class="container" id="main-content">
        <div class="spinner" id="loader"></div>
        <h2 style="font-size: 18px; color: #00ff88;" id="status-title">AI System Initializing...</h2>
        <p id="status-text">Connecting to Live Football Database...</p>
    </div>

    <div class="ad-placeholder">
        </div>

    <script>
        // نظام المحاكاة التلقائي لزيادة وقت بقاء الزائر (مناسب لـ LeadsLeap)
        window.onload = function() {
            const statusText = document.getElementById('status-text');
            const statusTitle = document.getElementById('status-title');
            const loader = document.getElementById('loader');

            setTimeout(() => { statusText.innerText = "Analyzing Real Madrid vs Barcelona stats..."; }, 2500);
            setTimeout(() => { statusText.innerText = "Calculating win probability and goal patterns..."; }, 5500);
            setTimeout(() => { statusText.innerText = "Finalizing 94.2% accurate score prediction..."; }, 8500);
            
            // النتيجة النهائية تظهر بعد 11 ثانية
            setTimeout(() => {
                loader.style.display = 'none';
                statusTitle.innerText = "Prediction Ready! 🎯";
                statusText.innerHTML = "AI predicts a high-intensity match.<br><br><span style='color:#00ff88; font-weight:bold;'>Click the buttons below to see full details.</span>";
            }, 11000);
        };
    </script>
