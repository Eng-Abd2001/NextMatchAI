<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Match Predictor ⚽</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            margin: 20px;
        }
        h1 { font-size: 22px; margin-bottom: 10px; color: #ffffff; }
        p { font-size: 14px; color: #aaaaaa; margin-bottom: 25px; }
        
        .team-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .card-rma { border-color: #dddddd; }
        .card-rma:hover { background: #ffffff; color: #121212; }
        .card-bar { border-color: #a50044; background: linear-gradient(to right, rgba(0, 77, 152, 0.1), rgba(165, 0, 68, 0.1)); }
        .card-bar:hover { background: linear-gradient(to right, #004d98, #a50044); color: white; }

        #loading-screen, #result-screen { display: none; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .reveal-btn {
            background: linear-gradient(45deg, #00ff88, #00bd68);
            border: none;
            color: #121212;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            margin: 20px 0;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="container" id="step-1">
        <h1>AI Match Predictor ⚽</h1>
        <p>Select a team to see the AI prediction for their next match!</p>
        <div class="team-card card-rma" onclick="startAI('Real Madrid')">
            <h2 style="margin:0">Real Madrid CF</h2>
        </div>
        <div class="team-card card-bar" onclick="startAI('FC Barcelona')">
            <h2 style="margin:0">FC Barcelona</h2>
        </div>
    </div>

    <div class="container" id="loading-screen">
        <div class="spinner"></div>
        <h2 id="loading-title">Analyzing...</h2>
        <p id="loading-text">Connecting to sports database...</p>
    </div>

    <div class="container" id="result-screen">
        <h1 id="res-team-name">Prediction Ready!</h1>
        <div class="final-score" id="score-display">?-?</div>
        <p>AI Confidence Level: 94.2%</p>
        <button class="reveal-btn" id="reveal-btn" onclick="showScore()">Show AI Score</button>
        <button class="reveal-btn" style="background:#444; color:white; margin-top:10px; display:none;" id="reset-btn" onclick="location.reload()">New Prediction</button>
    </div>

    <script>
        let selectedTeam = "";

        function startAI(teamName) {
            selectedTeam = teamName;
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            document.getElementById('loading-title').innerText = "Analyzing " + selectedTeam;

            setTimeout(() => { document.getElementById('loading-text').innerText = "Fetching squad fitness..."; }, 1000);
            setTimeout(() => { document.getElementById('loading-text').innerText = "Simulating match tactics..."; }, 2000);
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                document.getElementById('res-team-name').innerText = selectedTeam + " Next Match";
            }, 3000);
        }

        function showScore() {
            // توليد نتيجة عشوائية منطقية لمباراة كرة قدم
            const score1 = Math.floor(Math.random() * 4);
            const score2 = Math.floor(Math.random() * 3);
            
            document.getElementById('score-display').innerText = score1 + " - " + score2;
            document.getElementById('reveal-btn').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'block';
        }
    </script>
